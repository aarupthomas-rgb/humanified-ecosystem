<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=/thomasaarup/">
  <title>Humanified Ecosystem</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 2rem;
      background: #0f0f0f;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      max-width: 600px;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.1rem;
      margin-bottom: 2rem;
      color: #aaa;
    }
    a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #ff6b35;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 500;
      transition: all 0.3s;
    }
    a:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(255, 107, 53, 0.3);
    }
    .sites {
      margin-top: 3rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .site-link {
      padding: 0.5rem 1rem;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #ff6b35;
      font-size: 0.9rem;
    }
    .site-link:hover {
      background: #2a2a2a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🚀 Humanified Ecosystem</h1>
    <p>Redirecting to thomasaarup.dk...</p>
    <a href="/thomasaarup/">Go to Thomas Aarup</a>

    <div class="sites">
      <a href="/thomasaarup/" class="site-link">Thomas Aarup</a>
      <a href="/humanified/" class="site-link">HUMANIFIED</a>
      <a href="/ohgodmode/" class="site-link">OH GOD MODE</a>
    </div>

    <p style="margin-top: 2rem; font-size: 0.9rem; color: #666;">
      If you're not redirected, click "Go to Thomas Aarup" above.
    </p>
  </div>
</body>
</html>
