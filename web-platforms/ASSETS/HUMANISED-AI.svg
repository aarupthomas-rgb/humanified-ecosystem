  <line x1="158" y1="158" x2="135" y2="135" stroke="#FF8C00" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="158" y1="42" x2="135" y2="65" stroke="#FF8C00" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
